<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Medir altura</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <script type="module" src="js/app.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <select id="modeSelect">
          <option value="gyroscope">Gyroscope</option>
          <option value="manual">Manual</option>
          <option value="two-tap">Dois Toques</option>
        </select>
        <div id="toolbarActions">
          <button id="btnCalibrate" class="toolbar-btn">Calibrar</button>
          <button id="btnCapture" class="toolbar-btn">Foto</button>
        </div>
      </div>

      <div id="cameraContainer">
        <video id="myVideo"></video>
        <canvas id="overlay"></canvas>
        <div id="heightLine"></div>
        <div id="heightLineLabel">0.0 m</div>
        <div id="gallery" class="hidden"></div>
      </div>

      <div id="controls">
        <div id="controlsLeft">
          <label>Dist&acirc;ncia: <span id="distLabel">20</span> m</label>
          <div id="distBtns">
            <button class="dist-btn" data-step="-10">-10</button>
            <button class="dist-btn" data-step="-5">-5</button>
            <button class="dist-btn" data-step="-1">-1</button>
            <button class="dist-btn" data-step="1">+1</button>
            <button class="dist-btn" data-step="5">+5</button>
            <button class="dist-btn" data-step="10">+10</button>
          </div>
          <div id="manualAngleRow" class="hidden">
            <label>&Acirc;ngulo: <span id="angleLabel">0</span>&deg;</label>
            <input id="angleSlider" type="range" min="0" max="90" value="0" />
          </div>
          <div id="calibrationRow" class="hidden">
            <span id="calibrationStatus"></span>
            <button id="btnResetCalibration" class="hidden">Resetar calibra&ccedil;&atilde;o</button>
          </div>
        </div>
        <div id="controlsRight">
          <div id="twoTapRow" class="hidden">
            <button id="btnLockBase">1. Travar base</button>
            <button id="btnLockTop">2. Travar topo</button>
            <button id="btnReset">Reiniciar</button>
          </div>
          <div id="resultBox">
            <span id="heightInfo">0.0 m</span>
            <span id="angleInfo">(0.0&deg;)</span>
          </div>
        </div>
      </div>
    </div>

    <div id="calibrationModal" class="modal-overlay hidden">
      <div class="modal-box">
        <button id="calibrationClose" class="modal-close">&times;</button>
        <h3>Calibrar</h3>
        <p>Aponte para um objeto de altura conhecida (ex: porta 2,1m) e ajuste at&eacute; a linha vermelha alinhar com o topo.</p>
        <div class="modal-field">
          <label>Altura medida:</label>
          <span id="calibrationMeasured">0.00 m</span>
        </div>
        <div class="modal-field">
          <label>Altura real (m):</label>
          <input id="calibrationKnownInput" type="number" step="0.01" min="0.1" value="2.0" />
        </div>
        <button id="btnConfirmCalibration" class="modal-btn">Confirmar calibra&ccedil;&atilde;o</button>
      </div>
    </div>
  </body>
</html>
